<div class="theme-picker" data-theme-picker-control>
  <span class="theme-picker__label" id="{{ .id }}-label">Theme</span>
  <button
    type="button"
    id="{{ .id }}"
    class="theme-picker__button"
    data-theme-picker
    aria-label="Theme: Default Terminal. Click to switch to Dark Blue."
    title="Default Terminal"
  >
    <span class="theme-picker__swatch" aria-hidden="true"></span>
  </button>
</div>
